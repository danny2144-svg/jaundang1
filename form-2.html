<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>자운당 — 자운 아씨와의 대화 2/6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0a0608;
    --purple: #6d3a8a;
    --purple-deep: #4a2858;
    --purple-glow: #a060c8;
    --gold: #d4a857;
    --paper: #f5ede0;
    --paper-dim: #d8cdb8;
    --paper-soft: #a89e7a;
  }

  html, body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Pretendard', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background: var(--ink);
  }
  .device {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    position: relative;
    background: var(--ink);
    overflow: hidden;
    box-shadow: 0 0 80px rgba(109, 58, 138, 0.2);
    padding-bottom: 100px;
  }

  .topbar {
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 50;
  }
  .back-btn {
    background: transparent;
    border: 1px solid rgba(212, 168, 87, 0.4);
    color: var(--paper);
    width: 32px; height: 32px;
    text-decoration: none;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 14px;
  }
  .step-indicator {
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .step-indicator strong { color: var(--paper); font-weight: 800; }

  .progress-bar {
    height: 3px;
    background: rgba(212, 168, 87, 0.15);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple-glow), var(--gold));
    width: 33.33%;  /* 2/6 */
    transition: width 0.4s ease;
  }

  /* Character with bubble space above */
  .char-page {
    width: 100%;
    position: relative;
    background: var(--ink);
  }
  .bubble-zone {
    background: linear-gradient(180deg, #1a0a1f 0%, var(--ink) 100%);
    padding: 24px 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .char-image-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #1a0a1f 0%, #3a1845 30%, #1a0a1f 100%);
  }
  .char-image-wrap img {
    width: 100%; height: 100%; object-fit: cover; object-position: center top;
  }
  .char-fallback {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--paper-soft); font-size: 11px;
  }

  .bubbles-overlay {
    position: absolute;
    bottom: 12%;
    left: 5%;
    right: 5%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bubble {
    background: rgba(255, 255, 255, 0.97);
    color: #0a0608;
    padding: 16px 20px;
    border-radius: 22px 22px 22px 6px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 16px;
    line-height: 1.6;
    letter-spacing: -0.3px;
    max-width: 80%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .bubble.right {
    margin-left: auto;
    border-radius: 22px 22px 6px 22px;
  }
  .bubble strong { color: var(--purple); font-weight: 800; }

  /* Bottom buttons */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 16px 22px;
    background: linear-gradient(180deg, transparent, var(--ink) 30%);
    z-index: 40;
    display: flex;
    justify-content: center;
  }
  .bottom-bar-inner {
    width: 100%;
    max-width: 430px;
    display: flex;
    gap: 8px;
  }
  .btn-prev, .btn-next {
    padding: 17px 18px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    border: none;
  }
  .btn-prev {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--paper-dim);
    color: var(--paper);
    padding-left: 22px; padding-right: 22px;
  }
  .btn-next {
    flex: 1;
    background: linear-gradient(180deg, var(--purple-glow), var(--purple));
    color: var(--paper);
    border: 1px solid var(--gold);
    box-shadow: 0 4px 16px rgba(160, 96, 200, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="device">

  <div class="topbar">
    <a href="form-1.html" class="back-btn">‹</a>
    <div class="step-indicator"><strong>2</strong> / 6</div>
    <div style="width:32px"></div>
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>

  <section class="char-page">
    <div class="char-image-wrap">
      <img src="assets/character-butterfly.jpg" alt="자운 아씨"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="char-fallback" style="display:none;">— 자운 아씨 나비 컷 —</div>
    </div>
    <div class="bubble-zone">
      <div class="bubble">
        <strong id="userName">○○</strong>님의 사주, 잘 받았습니다.
      </div>
      <div class="bubble right">
        다만, 사주만으로는 다 못 짚어드리는 <strong>자리</strong>가 있어요.
      </div>
      <div class="bubble">
        몇 가지만 더 여쭤볼게요. 풀이가 훨씬 깊어져요.
      </div>
    </div>
  </section>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <a href="form-1.html" class="btn-prev">이전</a>
      <button type="button" class="btn-next" onclick="window.location.href='form-3.html'">
        예, 여쭤보십시오 →
      </button>
    </div>
  </div>

</div>

<script>
  const data = JSON.parse(sessionStorage.getItem('saju_input') || '{}');
  if (data.name) {
    document.getElementById('userName').textContent = data.name;
  }
</script>

</body>
</html>
